      { id: 'rec-8', circuitId: 'L4',  name: 'Master Bed Left Wall Socket', type: 'Outlet 🔌', room: 'Master Bed', notes: 'Bedside phone chargers & lamp.' },
      { id: 'rec-9', circuitId: 'L6',  name: 'Mom\'s Bath Mirror Overhead Plug', type: 'Outlet 🔌', room: 'Mom\'s Bath', upstreamGfciId: 'rec-6', notes: 'Fed from GFCI LOAD terminals. Protected by Vanity GFCI.' },
    ];

    const ROOM_OPTIONS = [
      'Office', 'Kitchen', 'Living Room', 'Master Bed', 'Guest Bed', 
      'Front Bed', 'Mom\'s Bath', 'Dining Room', 'Garage', 'Laundry Room', 'Exterior'
    ];

    const DEVICE_TYPES = [
      'Outlet 🔌', 'GFCI Outlet 🛡️', 'Light 💡', 'Switch 🎛️', 'Appliance 🍳', 'Solar Inverter ☀️', 'Other ⚙️'
    ];

    function App() {
      const [circuits, setCircuits] = useState(INITIAL_CIRCUITS);
      const [receptacles, setReceptacles] = useState(INITIAL_RECEPTACLES);
      const [selectedCircuitId, setSelectedCircuitId] = useState('L10'); 
      const [searchQuery, setSearchQuery] = useState('');
      const [activeTab, setActiveTab] = useState('directory'); // 'directory' or 'print'
      
      const [showRecModal, setShowRecModal] = useState(false);
      const [editingRec, setEditingRec] = useState(null);
      const [newRecData, setNewRecData] = useState({
        name: '',
        type: 'Outlet 🔌',
        room: 'Office',
        notes: '',
        upstreamGfciId: ''
      });
      const [selectedDownstreamIds, setSelectedDownstreamIds] = useState([]);

      const [showCircuitModal, setShowCircuitModal] = useState(false);
      const [editingCircuit, setEditingCircuit] = useState(null);
      const [roomOptions, setRoomOptions] = useState(ROOM_OPTIONS);
      const [showRoomModal, setShowRoomModal] = useState(false);
      const [showShareModal, setShowShareModal] = useState(false);

      const [toastMessage, setToastMessage] = useState(null);
      const triggerToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(null), 3000);
      };

      const selectedCircuit = useMemo(() => {
        return circuits.find(c => c.id === selectedCircuitId);
      }, [selectedCircuitId, circuits]);

      // Filter receptacles of selected circuit by search query if search is active
      const activeReceptacles = useMemo(() => {
        const recs = receptacles.filter(r => r.circuitId === selectedCircuitId);
        if (!searchQuery.trim()) return recs;
        const q = searchQuery.toLowerCase();
        return recs.filter(r => 
          r.name.toLowerCase().includes(q) || 
          r.room.toLowerCase().includes(q) || 
          r.notes.toLowerCase().includes(q)
        );
      }, [receptacles, selectedCircuitId, searchQuery]);

      // Calculate which circuits match the search query (to highlight/dim them)
      const searchMatchingIds = useMemo(() => {
        if (!searchQuery.trim()) return null;
        const q = searchQuery.toLowerCase();
        return new Set(
          circuits
            .filter(c => {
              const labelMatch = c.label.toLowerCase().includes(q);
              const idMatch = c.id.toLowerCase().includes(q);
              const notesMatch = c.notes?.toLowerCase().includes(q);
              const numMatch = c.num.includes(q);
              const recsMatch = receptacles.some(r => r.circuitId === c.id && (
                r.name.toLowerCase().includes(q) || 
                r.room.toLowerCase().includes(q) || 
                r.notes.toLowerCase().includes(q)
              ));
              return labelMatch || idMatch || notesMatch || numMatch || recsMatch;
            })
            .map(c => c.id)
        );
      }, [circuits, receptacles, searchQuery]);

      // Calculate overall system stats for energetic dashboard summary
      const systemStats = useMemo(() => {
        const activeCircuits = circuits.filter(c => c.type !== 'Blank');
        const totalAmps = activeCircuits.reduce((acc, c) => acc + (c.amps || 0), 0);
        const totalMapped = receptacles.length;
        const gfciProtected = receptacles.filter(r => r.type === 'GFCI Outlet 🛡️' || r.upstreamGfciId).length;

        return {
          activeCircuitsCount: activeCircuits.length,
          totalAmps,
          totalMapped,
          gfciProtected,
          gfciPercentage: totalMapped > 0 ? Math.round((gfciProtected / totalMapped) * 100) : 0
        };
      }, [circuits, receptacles]);

      const handleSaveCircuit = (e) => {
        e.preventDefault();
        setCircuits(prev => prev.map(c => c.id === editingCircuit.id ? editingCircuit : c));
        setShowCircuitModal(false);
        triggerToast(`Updated ${editingCircuit.label}`);
      };

      const openAddReceptacle = () => {
        setEditingRec(null);
        setNewRecData({
          name: '',
          type: 'Outlet 🔌',
          room: 'Office',
          notes: '',
          upstreamGfciId: ''
        });
        setSelectedDownstreamIds([]);
        setShowRecModal(true);
      };

      const openEditReceptacle = (rec) => {
        setEditingRec(rec);
        setNewRecData({
          name: rec.name,
          type: rec.type,
          room: rec.room,
          notes: rec.notes || '',
          upstreamGfciId: rec.upstreamGfciId || ''
        });
        const downstream = receptacles.filter(r => r.upstreamGfciId === rec.id).map(r => r.id);
        setSelectedDownstreamIds(downstream);
        setShowRecModal(true);
      };

      const handleSaveReceptacle = (e) => {
        e.preventDefault();
        if (!newRecData.name.trim()) return;

        let targetId = editingRec?.id;

        if (editingRec) {
          setReceptacles(prev => prev.map(r => r.id === editingRec.id ? { ...r, ...newRecData } : r));
        } else {
          targetId = `rec-${Date.now()}`;
          const newRec = {
            id: targetId,
            circuitId: selectedCircuitId,
            ...newRecData
          };
          setReceptacles(prev => [...prev, newRec]);
        }

        // Handle GFCI downstream assignments if this is a GFCI outlet
        if (newRecData.type === 'GFCI Outlet 🛡️') {
          setReceptacles(prev => prev.map(r => {
            if (r.id === targetId) return r;
            if (selectedDownstreamIds.includes(r.id)) {
              return { ...r, upstreamGfciId: targetId };
            } else if (r.upstreamGfciId === targetId) {
              return { ...r, upstreamGfciId: '' };
            }
            return r;
          }));
        }

        triggerToast(editingRec ? 'Receptacle mapping updated' : 'New receptacle mapped successfully!');
        setShowRecModal(false);
      };

      const handleDeleteReceptacle = (id) => {
        setReceptacles(prev => prev.filter(r => r.id !== id).map(r => r.upstreamGfciId === id ? { ...r, upstreamGfciId: '' } : r));
        triggerToast('Receptacle unmapped.');
      };

      const handleRenameRoom = (oldName, newName) => {
        if (!newName.trim() || oldName === newName) return;
        setRoomOptions(prev => prev.map(r => r === oldName ? newName : r));
        setReceptacles(prev => prev.map(rec => rec.room === oldName ? { ...rec, room: newName } : rec));
        triggerToast(`Renamed room to ${newName}`);
      };

      const handleDeleteRoom = (roomName) => {
        setRoomOptions(prev => prev.filter(r => r !== roomName));
        triggerToast(`Removed room ${roomName}`);
      };

      const handleAddRoom = (newRoomName) => {
        if (!newRoomName.trim()) return;
        if (roomOptions.includes(newRoomName)) {
          triggerToast('Room name already exists!');
          return;
        }
        setRoomOptions(prev => [...prev, newRoomName]);
        triggerToast(`Added room ${newRoomName}`);
      };

      const handleShareLink = async () => {
        const shareUrl = 'https://ferhotguy.github.io/1937-ElectricalPanel/';
        if (navigator.share) {
          try {
            await navigator.share({
              title: '1937 Bristol Ct. Circuit Panel Twin',
              text: 'Digital twin circuit panel directory mapping for 1937 Bristol Ct.',
              url: shareUrl,
            });
            triggerToast('Shared successfully!');
          } catch (err) {
            console.log('Share aborted', err);
          }
        } else {
          navigator.clipboard.writeText(shareUrl);
          triggerToast('Link copied to clipboard!');
        }
      };

      const handleExportJSON = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({ circuits, receptacles, roomOptions }, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `circuit_panel_directory_export.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        triggerToast('Exported project data successfully!');
      };

      const handleImportJSON = (e) => {
        const fileReader = new FileReader();
        if (e.target.files && e.target.files[0]) {
          fileReader.readAsText(e.target.files[0], "UTF-8");
          fileReader.onload = (event) => {
            try {
              const parsed = JSON.parse(event.target.result);
              if (parsed.circuits && parsed.receptacles) {
                setCircuits(parsed.circuits);
                setReceptacles(parsed.receptacles);
                if (parsed.roomOptions) {
                  setRoomOptions(parsed.roomOptions);
                }
                triggerToast('Successfully restored backup database!');
              } else {
                triggerToast('Error: Invalid backup file format');
              }
            } catch (err) {
              triggerToast('Error reading backup file');
            }
          };
        }
      };

      return (
        <div className="min-h-screen flex flex-col">
          {/* Toast Alert Banner */}
          {toastMessage && (
            <div className="fixed top-4 right-4 z-50 flat-toast font-bold px-4 py-3 rounded-xl shadow-none flex items-center gap-2 border animate-bounce">
              <Check size={18} className="stroke-[3]" />
              <span>{toastMessage}</span>
            </div>
          )}

          {/* Top Professional Header Bar */}
          <header className="flat-header sticky top-0 z-30 px-4 py-3">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
              <div className="flex items-center gap-3">
                <div className="p-2.5 bg-gradient-to-br from-[#00f0ff] to-[#f1c40f] rounded-xl text-slate-950 shadow-lg electric-glow">
                  <Zap className="fill-current stroke-[2.5] electric-zap-icon" size={26} />
                </div>
                <div>
                  <h1 className="text-xl font-black tracking-tight text-white flex items-center gap-2">
                    <span className="electric-gradient-text">Circuit Mapping & Panel Twin</span>
                  </h1>
                  <div className="flex flex-col md:flex-row md:items-center gap-1 md:gap-3 text-xs flat-text-muted">
                    <span>Digital twin of physical residential panel system</span>
                    <span className="hidden md:inline text-slate-500">•</span>
                    <span className="text-[#f1c40f] font-bold flex items-center gap-1">
                      <MapPin size={12} className="inline stroke-[2.5]" /> 1937 Bristol Ct. Linda, CA 95901
                    </span>
                  </div>
                </div>
              </div>

              {/* Search Bar */}
              <div className="relative w-full sm:w-72">
                <Search className="absolute left-3 top-2.5 text-slate-400" size={16} />
                <input 
                  type="text" 
                  placeholder="Search outlets, rooms, or breakers..." 
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full pl-9 pr-4 py-2 text-sm flat-input rounded-xl text-white placeholder-slate-400"
                />
                {searchQuery && (
                  <button 
                    onClick={() => setSearchQuery('')}
                    className="absolute right-3 top-2.5 text-xs text-slate-400 hover:text-white"
                  >
                    Clear
                  </button>
                )}
              </div>

              {/* Action Buttons */}
              <div className="flex items-center gap-2">
                <button 
                  onClick={handleExportJSON}
                  className="p-2 flat-breaker hover:bg-[#34495e] text-slate-300 rounded-lg hover:text-white transition-all border border-[#7f8c8d]"
                  title="Export Project Backup File"
                >
                  <Download size={18} />
                </button>
                <label 
                  className="p-2 flat-breaker hover:bg-[#34495e] text-slate-300 rounded-lg hover:text-white transition-all border border-[#7f8c8d] cursor-pointer"
                  title="Upload / Restore Backup File"
                >
                  <Upload size={18} />
                  <input type="file" accept=".json" onChange={handleImportJSON} className="hidden" />
                </label>
                <button 
                  onClick={() => setShowRoomModal(true)}
                  className="flex items-center gap-1.5 px-3 py-2 text-xs font-bold rounded-lg border flat-breaker text-slate-300 hover:text-white border-[#7f8c8d]"
                  title="Manage Room / Area Options"
                >
                  <Layers size={14} />
                  <span>Manage Rooms</span>
                </button>
                <button 
                  onClick={() => setShowShareModal(true)}
                  className="flex items-center gap-1.5 px-3 py-2 text-xs font-bold rounded-lg border flat-breaker text-slate-300 hover:text-white border-[#7f8c8d]"
                  title="Share Directory Link / QR Code"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                  <span>Share QR</span>
                </button>
                <button 
                  onClick={() => setActiveTab(activeTab === 'print' ? 'directory' : 'print')}
                  className={`flex items-center gap-2 px-3 py-2 text-xs font-bold rounded-lg border transition-all ${
                    activeTab === 'print' 
                      ? 'flat-btn-accent text-white' 
                      : 'flat-breaker text-slate-300 hover:text-white border-[#7f8c8d]'
                  }`}
                >
                  <Printer size={14} />
                  <span>Print Panel Door Card</span>
                </button>
              </div>
            </div>
          </header>

          {/* Primary Layout Area */}
          <main className="flex-1 max-w-7xl mx-auto w-full p-4 lg:p-6">
            {/* Electric System Live Summary Ribbon */}
            <div className="mb-6 grid grid-cols-2 sm:grid-cols-4 gap-3">
              <div className="flat-card p-3.5 flex items-center justify-between border-l-4 border-l-[#00f0ff]">
                <div>
                  <span className="text-[10px] uppercase font-bold text-[#94a3b8] block tracking-wider">Service Supply</span>
                  <span className="text-base font-black text-white">200A / 240V</span>
                </div>
                <div className="p-2 rounded-xl bg-[#00f0ff]/10 text-[#00f0ff]">
                  <Zap size={20} className="electric-glow" />
                </div>
              </div>

              <div className="flat-card p-3.5 flex items-center justify-between border-l-4 border-l-[#f1c40f]">
                <div>
                  <span className="text-[10px] uppercase font-bold text-[#94a3b8] block tracking-wider">Active Breakers</span>
                  <span className="text-base font-black text-[#f1c40f]">{systemStats.activeCircuitsCount} Slots</span>
                </div>
                <div className="p-2 rounded-xl bg-[#f1c40f]/10 text-[#f1c40f]">
                  <Database size={20} />
                </div>
              </div>

              <div className="flat-card p-3.5 flex items-center justify-between border-l-4 border-l-[#00e676]">
                <div>
                  <span className="text-[10px] uppercase font-bold text-[#94a3b8] block tracking-wider">Mapped Outlets</span>
                  <span className="text-base font-black text-[#00e676]">{systemStats.totalMapped} Points</span>
                </div>
                <div className="p-2 rounded-xl bg-[#00e676]/10 text-[#00e676]">
                  <Layers size={20} />
                </div>
              </div>

              <div className="flat-card p-3.5 flex items-center justify-between border-l-4 border-l-[#00f0ff]">
                <div>
                  <span className="text-[10px] uppercase font-bold text-[#94a3b8] block tracking-wider">GFCI Protection</span>
                  <span className="text-base font-black text-[#00f0ff]">{systemStats.gfciProtected} / {systemStats.totalMapped} ({systemStats.gfciPercentage}%)</span>
                </div>
                <div className="p-2 rounded-xl bg-[#00f0ff]/10 text-[#00f0ff]">
                  <ShieldCheck size={20} />
                </div>
              </div>
            </div>

            {activeTab === 'directory' && (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                {/* COLUMN 1: INTERACTIVE PANEL TWIN COMPONENT (5 cols) */}
                <div className="lg:col-span-5 flat-card p-5">
                  <div className="flex items-center justify-between mb-4 border-b-2 border-[#2c3e50] pb-3">
                    <div>
                      <h2 className="font-bold text-base flex items-center gap-2">
                        <Database size={16} className="text-[#1abc9c]" />
                        <span>Interactive Panel Mockup</span>
                      </h2>
                      <p className="text-xs flat-text-muted">Click breakers to map electrical receptacles</p>
                    </div>
                    <span className="text-[10px] uppercase bg-[#2c3e50] px-2 py-1 rounded font-bold text-slate-300">
                      200A SERVICE
                    </span>
                  </div>

                  {/* Physical Panel Graphics Outer Frame */}
                  <div className="bg-[#2c3e50] rounded-2xl p-4 border-4 border-[#34495e] relative">
                    <div className="bg-[#34495e] rounded-lg p-2 mb-4 text-center border-2 border-[#2c3e50]">
                      <div className="text-[10px] text-[#e74c3c] font-extrabold uppercase tracking-widest flex justify-center items-center gap-1.5">
                        <AlertTriangle size={11} /> WARNING: PHOTOVOLTAIC SOLAR CONNECTED
                      </div>
                    </div>

                    {/* Left/Right Grid Layout containing Breakers */}
                    <div className="grid grid-cols-2 gap-x-2 gap-y-1 bg-[#1a252f] rounded-xl p-3 relative">
                      
                      {/* LEFT BREAKER SLOTS (EVEN SPACES) */}
                      <div className="flex flex-col gap-1 pr-1 border-r-2 border-[#2c3e50]">
                        <div className="text-center text-[10px] font-bold flat-text-muted mb-1 tracking-widest uppercase">
                          Left Side (A)
                        </div>
                        {circuits.filter(c => c.side === 'left').map(circuit => {
                          const isSelected = selectedCircuitId === circuit.id;
                          const hasMapped = receptacles.some(r => r.circuitId === circuit.id);
                          const isMatch = searchMatchingIds === null || searchMatchingIds.has(circuit.id);
                          
                          return (
                            <div 
                              key={circuit.id}
                              onClick={() => setSelectedCircuitId(circuit.id)}
                              className={`group cursor-pointer rounded-lg p-1.5 transition-all duration-150 flex items-center justify-between relative ${
                                isSelected 
                                  ? 'flat-breaker-selected' 
                                  : 'flat-breaker'
                              } ${!isMatch ? 'opacity-25' : ''}`}
                            >
                              {/* Breaker Info Display */}
                              <div className="flex-1 min-w-0 pr-1">
                                <div className="flex items-center gap-1">
                                  <span className="text-[9px] font-extrabold text-[#2c3e50] bg-[#bdc3c7] px-1 py-0.5 rounded">
                                    {circuit.num}
                                  </span>
                                  <span className={`text-[10px] font-extrabold truncate ${
                                    circuit.type === 'Blank' ? 'text-[#7f8c8d]' : 'text-[#ecf0f1]'
                                  }`}>
                                    {circuit.label}
                                  </span>
                                </div>
                                {circuit.type !== 'Blank' && (
                                  <div className="flex items-center gap-1 mt-0.5">
                                    <span className="text-[9px] text-[#f1c40f] font-medium">
                                      {circuit.amps}A
                                    </span>
                                    <span className="text-[8px] bg-[#34495e] px-1 rounded text-slate-300 uppercase font-mono">
                                      {circuit.type}
                                    </span>
                                  </div>
                                )}
                              </div>
                                {/* Physical Visual Switch Handle Representation */}
                                <div className="flex items-center gap-1.5 shrink-0">
                                  {circuit.type === 'AFCI' && (
                                    <div className="w-2.5 h-2.5 rounded-full bg-[#f1c40f] border border-slate-950 flex shrink-0 items-center justify-center animate-pulse shadow-[0_0_8px_rgba(241,196,15,0.7)]" title="AFCI Self-Test Switch" />
                                  )}
                                  
                                  {circuit.type !== 'Blank' ? (
                                    <div className="w-8 h-4 bg-slate-950 rounded-sm relative border border-slate-700 flex items-center justify-start px-0.5 shadow-inner">
                                      <div className="w-4.5 h-3 bg-gradient-to-r from-[#00e676] to-[#00b894] text-slate-950 rounded-sm shadow ml-auto flex items-center justify-center text-[7px] font-black">
                                        ON
                                      </div>
                                    </div>
                                  ) : (
                                    <div className="w-8 h-4 bg-slate-900 border border-dashed border-slate-800 rounded-sm flex items-center justify-center text-[7px] text-slate-700 font-bold">
                                      MT
                                    </div>
                                  )}
                                </div>

                                {/* Receptacle count badge */}
                                {hasMapped && (
                                  <span className="absolute -top-1.5 -right-1.5 bg-[#00f0ff] text-slate-950 text-[9px] font-black w-4.5 h-4.5 rounded-full flex items-center justify-center shadow-[0_0_10px_rgba(0,240,255,0.7)]">
                                    {receptacles.filter(r => r.circuitId === circuit.id).length}
                                  </span>
                                )}
                            </div>
                          );
                        })}
                      </div>

                      {/* RIGHT BREAKER SLOTS (ODD SPACES) */}
                      <div className="flex flex-col gap-1 pl-1">
                        <div className="text-center text-[10px] font-bold flat-text-muted mb-1 tracking-widest uppercase">
                          Right Side (B)
                        </div>
                        {circuits.filter(c => c.side === 'right').map(circuit => {
                          const isSelected = selectedCircuitId === circuit.id;
                          const hasMapped = receptacles.some(r => r.circuitId === circuit.id);
                          const isSolar = circuit.type === 'Double-Pole-Solar';
                          const isMatch = searchMatchingIds === null || searchMatchingIds.has(circuit.id);

                          return (
                            <div 
                              key={circuit.id}
                              onClick={() => setSelectedCircuitId(circuit.id)}
                              className={`group cursor-pointer rounded-lg p-1.5 transition-all duration-150 flex items-center justify-between relative ${
                                isSelected 
                                  ? 'flat-breaker-selected' 
                                  : isSolar 
                                    ? 'flat-breaker flat-breaker-solar'
                                    : 'flat-breaker'
                              } ${!isMatch ? 'opacity-25' : ''}`}
                            >
                                {/* Physical Switch Handle */}
                                <div className="flex items-center gap-1.5 shrink-0 pr-1">
                                  {circuit.type !== 'Blank' ? (
                                    <div className="w-8 h-4 bg-slate-950 rounded-sm relative border border-slate-700 flex items-center justify-start px-0.5 shadow-inner">
                                      <div className="w-4.5 h-3 bg-gradient-to-r from-[#00e676] to-[#00b894] text-slate-950 rounded-sm shadow flex items-center justify-center text-[7px] font-black">
                                        ON
                                      </div>
                                    </div>
                                  ) : (
                                    <div className="w-8 h-4 bg-slate-900 border border-dashed border-slate-800 rounded-sm flex items-center justify-center text-[7px] text-slate-700 font-bold">
                                      MT
                                    </div>
                                  )}
                                </div>

                                {/* Breaker Info */}
                                <div className="flex-1 min-w-0 pl-1 text-right">
                                  <div className="flex items-center justify-end gap-1">
                                    <span className={`text-[10px] font-extrabold truncate ${
                                      isSolar ? 'text-[#ff4757]' : circuit.type === 'Blank' ? 'text-[#7f8c8d]' : 'text-[#ecf0f1]'
                                    }`}>
                                      {circuit.label}
                                    </span>
                                    <span className="text-[9px] font-extrabold text-[#0b0f19] bg-[#e2e8f0] px-1 py-0.5 rounded">
                                      {circuit.num}
                                    </span>
                                  </div>
                                  {circuit.type !== 'Blank' && (

                        value={editingCircuit.amps}
                        onChange={(e) => setEditingCircuit(prev => ({ ...prev, amps: parseInt(e.target.value) }))}
                        className="w-full flat-input rounded-xl px-3 py-2 text-sm text-white"
                      >
                        <option value={15}>15 Amps</option>
                        <option value={20}>20 Amps</option>
                        <option value={25}>25 Amps</option>
                        <option value={30}>30 Amps</option>
                        <option value={40}>40 Amps</option>
                        <option value={50}>50 Amps</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-bold flat-text-muted uppercase mb-1">Breaker Type / Spec</label>
                      <select 
                        value={editingCircuit.type}
                        onChange={(e) => setEditingCircuit(prev => ({ ...prev, type: e.target.value }))}
                        className="w-full flat-input rounded-xl px-3 py-2 text-sm text-white"
                      >
                        <option value="Standard">Standard Breaker</option>
                        <option value="AFCI">AFCI Protected</option>
                        <option value="GFCI">GFCI Protected</option>
                        <option value="Double-Pole">Double-Pole (240V)</option>
                        <option value="Double-Pole-Solar">Double-Pole Solar Feed</option>
                        <option value="Blank">Blank Cover</option>
                      </select>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold flat-text-muted uppercase mb-1">Coverage Scope Notes</label>
                    <textarea 
                      rows={3}
                      value={editingCircuit.notes}
                      onChange={(e) => setEditingCircuit(prev => ({ ...prev, notes: e.target.value }))}
                      className="w-full flat-input rounded-xl px-3 py-2 text-sm text-white resize-none"
                    />
                  </div>

                  <div className="flex items-center justify-end gap-2 pt-2">
                    <button 
                      type="button"
                      onClick={() => setShowCircuitModal(false)}
                      className="px-4 py-2 text-xs font-bold flat-btn-secondary rounded-xl"
                    >
                      Cancel
                    </button>
                    <button 
                      type="submit"
                      className="px-4 py-2 text-xs font-bold flat-btn-primary rounded-xl"
                    >
                      Update Properties
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* ROOM MANAGEMENT MODAL */}
          {showRoomModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(0,0,0,0.85)' }}>
              <div className="flat-modal w-full max-w-md p-6 relative text-white animate-fade-in">
                <h4 className="text-lg font-black mb-1 text-white">Manage Room / Area Options</h4>
                <p className="text-xs flat-text-muted mb-4">
                  Add, rename, or delete room names in the system. Renaming a room will automatically update all mapped receptacles.
                </p>

                {/* Add new room inline form */}
                <div className="flex gap-2 mb-4 pb-4 border-b border-[#2c3e50]">
                  <input 
                    type="text" 
                    placeholder="New Room Name (e.g. Pantry, Attic)" 
                    id="new-room-input"
                    className="flex-1 flat-input rounded-xl px-3 py-2 text-sm text-white"
                    onKeyDown={(e) => {
                      if (e.key === 'Enter') {
                        handleAddRoom(e.target.value);
                        e.target.value = '';
                      }
                    }}
                  />
                  <button 
                    onClick={() => {
                      const input = document.getElementById('new-room-input');
                      handleAddRoom(input.value);
                      input.value = '';
                    }}
                    className="px-4 py-2 text-xs font-bold flat-btn-primary rounded-xl"
                  >
                    Add
                  </button>
                </div>

                {/* Rooms scrollable list */}
                <div className="space-y-2 max-h-[250px] overflow-y-auto pr-2 mb-4">
                  {roomOptions.map(room => (
                    <div key={room} className="flex items-center justify-between bg-[#2c3e50] p-2 rounded-lg border border-[#34495e]">
                      <span className="text-sm font-medium">{room}</span>
                      <div className="flex items-center gap-2">
                        <button 
                          onClick={() => {
                            const newName = prompt(`Rename "${room}" to:`, room);
                            if (newName) handleRenameRoom(room, newName);
                          }}
                          className="text-xs px-2 py-1 flat-breaker rounded hover:bg-[#34495e] border border-[#7f8c8d] text-slate-300"
                        >
                          Rename
                        </button>
                        <button 
                          onClick={() => {
                            if (confirm(`Are you sure you want to remove "${room}"? Receptacles currently mapped to this room will retain their label but their category dropdown list will update.`)) {
                              handleDeleteRoom(room);
                            }
                          }}
                          className="text-xs px-2 py-1 bg-red-600/20 text-red-400 border border-red-500/30 rounded hover:bg-red-600/30"
                        >
                          Delete
                        </button>
                      </div>
                    </div>
                  ))}
                </div>

                <div className="flex items-center justify-end">
                  <button 
                    onClick={() => setShowRoomModal(false)}
                    className="px-4 py-2 text-xs font-bold flat-btn-secondary rounded-xl"
                  >
                    Close
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* SHARE / QR CODE MODAL */}
          {showShareModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ backgroundColor: 'rgba(0,0,0,0.85)' }}>
              <div className="flat-modal w-full max-w-sm p-6 relative text-white animate-fade-in text-center flex flex-col items-center">
                <h4 className="text-lg font-black mb-1 text-white">Share Directory Link</h4>
                <p className="text-xs flat-text-muted mb-4">Scan the QR code to open the directory on your mobile device</p>
                
                {/* QR Code Container */}
                <div className="bg-white p-4 rounded-2xl mb-4 border-4 border-[#2c3e50] inline-block">
                  <img 
                    src="./temp/qrcode.png" 
                    alt="Scan to Share Directory" 
                    className="w-48 h-48 object-contain"
                    onError={(e) => {
                      e.target.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://ferhotguy.github.io/1937-ElectricalPanel/';
                    }}
                  />
                </div>

                <div className="w-full flat-card-inner p-3 mb-4 rounded-xl text-center">
                  <span className="text-[10px] flat-text-muted font-bold uppercase tracking-wider block mb-1">Web Address</span>
                  <span className="text-xs font-mono select-all break-all text-white font-bold block">
                    https://ferhotguy.github.io/1937-ElectricalPanel/
                  </span>
                </div>

                <div className="flex gap-2 w-full">
                  <button 
                    onClick={() => {
                      navigator.clipboard.writeText('https://ferhotguy.github.io/1937-ElectricalPanel/');
                      triggerToast('Link copied to clipboard!');
                    }}
                    className="flex-1 px-4 py-2.5 text-xs font-bold flat-btn-secondary rounded-xl"
                  >
                    Copy Link
                  </button>
                  <button 
                    onClick={handleShareLink}
                    className="flex-1 px-4 py-2.5 text-xs font-bold flat-btn-primary rounded-xl"
                  >
                    Share URL
                  </button>
                </div>

                <button 
                  onClick={() => setShowShareModal(false)}
                  className="mt-4 text-xs text-slate-400 hover:text-white underline"
                >
                  Close Window
                </button>
              </div>
            </div>
          )}

          {/* Styled Physical Print CSS Overrides */}
          <style>{`
            @media print {
              body * {
                visibility: hidden;
              }
              #printable-panel-card, #printable-panel-card * {
                visibility: visible;
              }
              #printable-panel-card {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                border: 2px solid black !important;
                box-shadow: none !important;
              }
            }
          `}</style>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
